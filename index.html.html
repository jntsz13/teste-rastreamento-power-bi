<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Balsas</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0f172a; font-family: Arial, sans-serif; overflow: hidden; }
  .container { display: flex; width: 100%; height: 100vh; }
  .map-area { flex: 1; position: relative; min-width: 0; }
  #map { width: 100%; height: 100%; background: #111827; }

  /* Override Leaflet tiles para tema escuro */
  .leaflet-tile { filter: none; }

  .sidebar { width: 260px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
  .tab-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; padding: 8px; background: #0f172a; }
  .tab { background: #1e293b; color: #64748b; font-size: 10px; font-weight: bold; padding: 7px 2px; text-align: center; border-radius: 4px; cursor: pointer; border: none; transition: all .15s; line-height: 1.3; }
  .tab.active { background: #334155; color: #f1f5f9; }
  .tab:hover { background: #293548; color: #cbd5e1; }
  .panel { flex: 1; padding: 14px; overflow-y: auto; }
  .ptitle { color: #f1f5f9; font-size: 13px; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; font-size: 11px; color: #64748b; }
  .row .val { color: #e2e8f0; font-weight: bold; margin-left: auto; text-align: right; max-width: 140px; }
  .badge { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-late  { background: #7f1d1d; color: #fca5a5; }
  .badge-early { background: #14532d; color: #86efac; }
  .badge-ok    { background: #1e3a5f; color: #93c5fd; }
  .pbar { width: 100%; height: 4px; background: #334155; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 2px; }

  /* Legenda customizada sobre o mapa */
  .map-legend {
    position: absolute;
    bottom: 28px;
    left: 10px;
    z-index: 1000;
    background: rgba(15,23,42,.92);
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 10px;
    color: #94a3b8;
    pointer-events: none;
  }
  .li { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Ícone de balsa SVG no Leaflet */
  .ferry-icon-wrap { cursor: pointer; }
  .ferry-label {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: bold;
    white-space: nowrap;
    text-shadow: 0 0 3px #000;
  }

  /* Popup Leaflet tema escuro */
  .leaflet-popup-content-wrapper {
    background: #1e293b;
    border: 1px solid #334155;
    color: #e2e8f0;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .leaflet-popup-tip { background: #1e293b; }
  .leaflet-popup-content { margin: 10px 14px; font-size: 11px; line-height: 1.7; min-width: 180px; }
  .popup-title { font-size: 13px; font-weight: bold; color: #f1f5f9; margin-bottom: 6px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
  .popup-row { display: flex; justify-content: space-between; gap: 10px; }
  .popup-row span:last-child { font-weight: bold; color: #e2e8f0; }
  .leaflet-container { background: #111827; }

  /* Atribuição Leaflet tema escuro */
  .leaflet-control-attribution {
    background: rgba(15,23,42,0.8) !important;
    color: #475569 !important;
  }
  .leaflet-control-attribution a { color: #64748b !important; }
</style>
</head>
<body>

<!-- ======================================================
     INSTRUÇÕES DE INTEGRAÇÃO COM POWER BI (DAX)
     ======================================================

  PASSO 1 — Certifique-se que sua tabela tem estas colunas:
    - Balsa                      (texto: "SW OSAKA", "SW DUBAI", etc.)
    - Empurrador                 (texto: "CONFIANÇA VII", etc.)
    - ViagemID                   (texto: "O-2801", etc.)
    - Inicio de viagem           (data/hora)
    - Previsão de chegada        (data/hora)
    - Situação                   (texto: "Atrasado", "Adiantado", "No Prazo")
    - horas                      (texto: "7:30", "15:00", etc.)
    - RACKS                      (número inteiro)
    - MERCADO                    (número inteiro)
    - Cargas                     (número inteiro)
    - Posição percentual limitada (número decimal: 0.0 a 1.0)
    - Distância percorrida       (número: km percorridos)
    - Distância Total            (número: ex. 1600)
    - ajustadakm                 (número: km ajustados)

  PASSO 2 — Crie a medida DAX abaixo no Power BI Desktop:

  -------------------------------------------------------

  MapaHTML =
  VAR _HTML_INICIO = "<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'>"
  & "<meta name='viewport' content='width=device-width,initial-scale=1.0'>"
  & "<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>"
  & "<style>"
  & "*{box-sizing:border-box;margin:0;padding:0}"
  & "html,body{width:100%;height:100%;background:#0f172a;font-family:Arial,sans-serif;overflow:hidden}"
  & ".container{display:flex;width:100%;height:100vh}"
  & ".map-area{flex:1;position:relative;min-width:0}"
  & "#map{width:100%;height:100%;background:#111827}"
  & ".sidebar{width:260px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}"
  & ".tab-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:8px;background:#0f172a}"
  & ".tab{background:#1e293b;color:#64748b;font-size:10px;font-weight:bold;padding:7px 2px;text-align:center;border-radius:4px;cursor:pointer;border:none;line-height:1.3}"
  & ".tab.active{background:#334155;color:#f1f5f9}"
  & ".panel{flex:1;padding:14px;overflow-y:auto}"
  & ".ptitle{color:#f1f5f9;font-size:13px;font-weight:bold;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:8px}"
  & ".row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:11px;color:#64748b}"
  & ".row .val{color:#e2e8f0;font-weight:bold;margin-left:auto;text-align:right;max-width:140px}"
  & ".badge{font-size:10px;font-weight:bold;padding:2px 8px;border-radius:10px;white-space:nowrap}"

  & ".badge-ok{background:#1e3a5f;color:#93c5fd}"
  & ".pbar{width:100%;height:4px;background:#334155;border-radius:2px;margin-top:4px;overflow:hidden}"

  & ".map-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(15,23,42,.92);border:1px solid #334155;border-radius:6px;padding:7px 10px;font-size:10px;color:#94a3b8;pointer-events:none}"

  & "<div class='container'><div class='map-area'><div id='map'></div>"
  & "<div class='map-legend'>"
  & "<div class='li'><div class='ld' style='background:#ef4444'></div><span>Atrasado</span></div>"
  & "<div class='li'><div class='ld' style='background:#22c55e'></div><span>Adiantado</span></div>"
  & "<div class='li'><div class='ld' style='background:#3b82f6'></div><span>No Prazo</span></div>"

  VAR _dados = SELECTCOLUMNS(
      'Tabela1',
      "balsa",  'Tabela1'[Balsa],
      "emp",    'Tabela1'[Empurrador],
      "viagem", 'Tabela1'[ViagemID],
      "saida",  FORMAT('Tabela1'[Inicio de viagem],    "DD/MM/YYYY HH:MM"),
      "prev",   FORMAT('Tabela1'[Previsão de chegada], "DD/MM/YYYY HH:MM"),
      "sit",    'Tabela1'[Situação],
      "hrs",    'Tabela1'[horas],
      "racks",  'Tabela1'[RACKS],
      "merc",   'Tabela1'[MERCADO],
      "cargas", 'Tabela1'[Cargas],
      "pct",    'Tabela1'[Posição percentual limitada] * 100,
      "dist",   'Tabela1'[Distância percorrida],
      "tot",    'Tabela1'[Distância Total],
      "ajust",  'Tabela1'[ajustadakm]
  )

  VAR _json = CONCATENATEX(
      _dados,
      "{"
      & """balsa"":"""  & [balsa]  & ""","
      & """emp"":"""    & [emp]    & ""","
      & """viagem"":""" & [viagem] & ""","
      & """saida"":"""  & [saida]  & ""","
      & """prev"":"""   & [prev]   & ""","
      & """sit"":"""    & [sit]    & ""","
      & """hrs"":"""    & [hrs]    & ""","
      & """racks"":"    & [racks]  & ","
      & """merc"":"     & [merc]   & ","
      & """cargas"":"   & [cargas] & ","
      & """pct"":"      & ROUND([pct],  2) & ","
      & """dist"":"     & ROUND([dist], 1) & ","
      & """tot"":"      & [tot]    & ","
      & """ajust"":"    & ROUND([ajust],1)
      & "}",
      ",",
      [balsa]
  )

  VAR _SCRIPT_DADOS = "window.BALSAS_DATA=[" & _json & "];"

  -- Cole aqui o conteúdo do bloco <script> do arquivo HTML
  -- (tudo entre "<script>" e "</script>" no final do arquivo HTML,
  --  exceto a tag <script> em si). Substitua as aspas duplas por duas aspas duplas.
  -- Exemplo abreviado — substitua pelo conteúdo real:
  VAR _SCRIPT_MAPA =
      "var BALSAS_DATA=window.BALSAS_DATA||[];"
      -- ... (cole aqui o restante do script do mapa) ...

  RETURN
      _HTML_INICIO
      & _SCRIPT_DADOS
      & _SCRIPT_MAPA
      & "</script></body></html>"

<script>

// ============================================================
// GOOGLE SHEETS AUTO UPDATE
// ============================================================
async function carregarGoogleSheets() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSga5AwHygAjnPf3G1kmoiecnvzxD3VcbmaRO3kdeCH1N9jmOwKp1uBvrY8Jo9JCfys2e16OQPfn6Jh/gviz/tq?tqx=out:json";

    const response = await fetch(url);
    const text = await response.text();

    // Remove wrapper do Google Visualization API
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    const dados = rows.map(r => {
      const c = r.c || [];

      return {
        balsa:  c[0]?.v || "",
        emp:    c[1]?.v || "",
        viagem: c[2]?.v || "",
        saida:  c[3]?.f || c[3]?.v || "",
        prev:   c[4]?.f || c[4]?.v || "",
        sit:    c[5]?.v || "No Prazo",
        hrs:    c[6]?.v || "0:00",
        racks:  Number(c[7]?.v || 0),
        merc:   Number(c[8]?.v || 0),
        cargas: Number(c[9]?.v || 0),
        pct:    Number(c[10]?.v || 0),
        dist:   Number(c[11]?.v || 0),
        tot:    Number(c[12]?.v || 1600),
        ajust:  Number(c[13]?.v || 0)
      };
    });

    if (dados.length > 0) {
      window.BALSAS_DATA = dados;
      BALSAS_DATA = dados;

      if (typeof buildMarkers === "function") {
        buildMarkers();
      }

      if (typeof buildTabs === "function") {
        buildTabs();
      }

      if (typeof buildPanel === "function") {
        buildPanel(0);
      }

      console.log("Google Sheets conectado com sucesso!");
    }

  } catch (erro) {
    console.error("Erro ao carregar Google Sheets:", erro);
  }
}

carregarGoogleSheets();

function dist2d(a, b) {
  var dx = a[0]-b[0], dy = a[1]-b[1];
  return Math.sqrt(dx*dx + dy*dy);
}

function getPosAtPct(pct) {
  var total = 0;
  for (var i = 0; i < ROUTE_LONLAT.length-1; i++)
    total += dist2d(ROUTE_LONLAT[i], ROUTE_LONLAT[i+1]);
  var target = pct * total, acc = 0;
  for (var i = 0; i < ROUTE_LONLAT.length-1; i++) {
    var d = dist2d(ROUTE_LONLAT[i], ROUTE_LONLAT[i+1]);
    if (acc + d >= target) {
      var t = (target - acc) / d;
      return [
        ROUTE_LONLAT[i][1] + t * (ROUTE_LONLAT[i+1][1] - ROUTE_LONLAT[i][1]),
        ROUTE_LONLAT[i][0] + t * (ROUTE_LONLAT[i+1][0] - ROUTE_LONLAT[i][0])
      ];
    }
    acc += d;
  }
  return [ROUTE_LONLAT[ROUTE_LONLAT.length-1][1], ROUTE_LONLAT[ROUTE_LONLAT.length-1][0]];
}

function statusColor(s) { return s==='Atrasado'?'#ef4444':s==='Adiantado'?'#22c55e':'#3b82f6'; }

function makeFerryIcon(color, bg, isSelected) {
  var W = 48, H = 32;
  var shadow = isSelected ? '0 0 8px ' + color + ', 0 0 16px ' + color : '0 0 4px rgba(0,0,0,.6)';
  var dotSize = isSelected ? 13 : 10;
  var html =
    '<div style="position:relative;width:' + W + 'px">' +
      '<div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);' +
           'width:' + dotSize + 'px;height:' + dotSize + 'px;border-radius:50%;background:' + color + ';' +
           'border:2px solid rgba(255,255,255,0.7);box-shadow:' + shadow + ';z-index:2"></div>' +
      '<img src="' + FERRY_ICON_B64 + '" width="' + W + '" height="' + H + '" ' +
           'style="display:block;" />' +
    '</div>';
  return L.divIcon({
    className: '',
    html: html,
    iconSize: [W, H + 6],
    iconAnchor: [W/2, H/2 + 6]
  });
}

// ============================================================
// MARCADORES DAS BALSAS
// ============================================================
var markers = [];
var current = 0;

// Offsets para evitar sobreposição (em graus)
var offsets = [
  [0, 0], [0, 0.05], [0, -0.05],
  [0.04, 0], [-0.04, 0], [0, 0.1]
];

function buildMarkers() {
  // Remove marcadores antigos
  markers.forEach(function(m) { map.removeLayer(m.marker); map.removeLayer(m.tooltip); });
  markers = [];

  BALSAS_DATA.forEach(function(d, i) {
    var pct = d.pct / 100;
    var pos = getPosAtPct(pct);
    var lat = pos[0] + (offsets[i] ? offsets[i][0] : 0);
    var lng = pos[1] + (offsets[i] ? offsets[i][1] : 0);
    var color = statusColor(d.sit);
    var bg = statusBg(d.sit);
    var isSelected = (i === current);

    var icon = makeFerryIcon(color, bg, isSelected);
    var marker = L.marker([lat, lng], { icon: icon, zIndexOffset: isSelected ? 1000 : 0 }).addTo(map);

    var short = d.balsa.replace('SW ', '');
    var tooltip = L.tooltip({
      permanent: true,
      direction: 'bottom',
      offset: [0, 18],
      className: 'ferry-tt'
    })
    .setContent('<span style="font-size:8px;font-weight:bold;color:' + color + ';text-shadow:0 0 3px #000">' + short + '</span>')
    .setLatLng([lat, lng])
    .addTo(map);

    // Popup com info resumida
    var popupHtml = '<div class="popup-title">⛴ ' + d.balsa + '</div>'
      + '<div class="popup-row"><span>⚓ Empurrador</span><span>' + d.emp + '</span></div>'
      + '<div class="popup-row"><span>🆔 Viagem</span><span>' + d.viagem + '</span></div>'
      + '<div class="popup-row"><span>' + statusIcon(d.sit) + ' Status</span><span><span class="badge ' + badgeClass(d.sit) + '">' + d.sit + ' ' + d.hrs + '</span></span></div>'
      + '<div class="popup-row"><span>📍 Progresso</span><span>' + d.pct.toFixed(1) + '%</span></div>'
      + '<div class="popup-row"><span>📏 Percorrido</span><span>' + d.dist.toFixed(0) + ' km</span></div>';
    marker.bindPopup(popupHtml, { maxWidth: 220 });

    marker.on('click', function() { sel(i); });

    markers.push({ marker: marker, tooltip: tooltip, lat: lat, lng: lng });
  });
}

// ============================================================
// SIDEBAR — TABS E PAINEL
// ============================================================
function buildTabs() {
  document.getElementById('tabs').innerHTML = BALSAS_DATA.map(function(d, i) {
    var short = d.balsa.replace('SW ', '');
    return '<button class="tab' + (i===current?' active':'') + '" onclick="sel(' + i + ')">' + short + '</button>';
  }).join('');
}

function buildPanel() {
  var d = BALSAS_DATA[current];
  var c = statusColor(d.sit);
  document.getElementById('panel').innerHTML =
    '<div class="ptitle">'
    + '<svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'
    + '<rect x="2" y="9" width="20" height="8" rx="2" fill="' + c + '"/>'
    + '<rect x="6" y="3" width="12" height="6" rx="1" fill="' + c + '" opacity="0.7"/>'
    + '<path d="M1 17 L2 21 L22 21 L23 17Z" fill="' + c + '" opacity="0.5"/>'
    + '</svg>' + d.balsa + '</div>'
    + '<div class="row"><span>⚓ Empurrador</span><span class="val">' + d.emp + '</span></div>'
    + '<div class="row"><span>🧭 Sentido</span><span class="val">BEL × MAO</span></div>'
    + '<div class="row"><span>🆔 Viagem</span><span class="val">' + d.viagem + '</span></div>'
    + '<div class="row"><span>📅 Saída</span><span class="val">' + d.saida + '</span></div>'
    + '<div class="row"><span>📋 Previsão</span><span class="val">' + d.prev + '</span></div>'
    + '<div class="row"><span>' + statusIcon(d.sit) + ' Status</span>'
    + '<span class="val"><span class="badge ' + badgeClass(d.sit) + '">' + d.sit + ' ' + d.hrs + '</span></span></div>'
    + '<div class="row"><span>🔴 Rack</span><span class="val">' + d.racks + '</span></div>'
    + '<div class="row"><span>🟠 Mercado</span><span class="val">' + d.merc + '</span></div>'
    + '<div class="row"><span>📦 Cargas</span><span class="val">' + d.cargas + '</span></div>'
    + '<div style="margin-top:14px">'
    + '<div style="font-size:10px;color:#475569;margin-bottom:5px">Progresso (BEL → MAO)</div>'
    + '<div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:4px">'
    + '<span>BEL</span><span style="color:' + c + ';font-weight:bold">' + d.pct.toFixed(1) + '%</span><span>MAO</span></div>'
    + '<div class="pbar"><div class="pfill" style="width:' + d.pct + '%;background:' + c + '"></div></div>'
    + '<div style="font-size:9px;color:#475569;margin-top:5px;text-align:right">' + d.dist.toFixed(0) + ' km / ' + d.tot + ' km</div>'
    + '<div style="font-size:9px;color:#475569;margin-top:2px;text-align:right">Posição ajustada: ' + d.ajust.toFixed(1) + ' km</div>'
    + '</div>';
}

function sel(i) {
  current = i;
  buildMarkers();
  buildTabs();
  buildPanel();
  // Pan suave para a balsa selecionada
  var m = markers[i];
  if (m) map.panTo([m.lat, m.lng], { animate: true, duration: 0.5 });
}

// Remover estilo padrão dos tooltips do Leaflet
var style = document.createElement('style');
style.textContent = [
  '.leaflet-tooltip { background: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; }',
  '.leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }',
  '.city-label { pointer-events: none; }',
  '.leaflet-control-zoom { border: 1px solid #334155 !important; }',
  '.leaflet-control-zoom a { background: #1e293b !important; color: #94a3b8 !important; border-bottom: 1px solid #334155 !important; }',
  '.leaflet-control-zoom a:hover { background: #293548 !important; color: #f1f5f9 !important; }'
].join('\n');
document.head.appendChild(style);

// ============================================================
// INICIALIZAR
// ============================================================
buildMarkers();
buildTabs();
buildPanel();
</script>
</body>
</html>
